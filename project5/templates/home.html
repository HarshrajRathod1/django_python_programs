<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project5</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            height:100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(255,0,0,0.8), rgba(255,255,0,0));
        }
        form{
            width:300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: rgb(105, 54, 54);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 5px black;
        }
        form>div{
            font-size: medium;
            color:white;
            font-weight: 500;
        }
        form>div>input{
            width:90%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 15px;
            margin-top: 5px;
        }
        button{
            width:60%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin: 0 auto;
            font-size: 17px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="form-container">
    <form action="/register/" method="post">
        {% csrf_token %}
        <div>
            <lable for="name">Name</lable><br>
            <input type="text" name="name" id="name">
        </div>
        <div>
            <lable for="uname">User Name</lable><br>
            <input type="text" name="uname" id="uname">
        </div>
        <div>
            <lable for="pwd">PassWord</lable><br>
            <input type="password" name="pwd" id="pwd">
        </div>
        <button type="submit">Register</button>
        <button type="reset">Clear</button>
    </form>
    </div>
</body>
</html>
