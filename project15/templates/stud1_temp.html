<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td>input[type='text']{
            color:black;
            background-color: cyan;
        }
        td>input[type='number']{
            color:black;
            background-color: cyan;
        }
    </style>
</head>
<body>
    <form method="post">
        {%csrf_token%}
        <table border="3" width="50%" align="center">
        {% for filed in form %}
        <tr>
            <td style="background-color: blue;color:white;">{{filed.label}}</td>
            <td>{{filed}}</td>
        </tr>
        {%endfor%}
        {%for filed in form%}
        {%for error in filed.errors%}
        <tr>
        <td>{{error}}</td>
        </tr>
        {%endfor%}
        {%endfor%}
        <tr>
            <td><input type="submit" value="submit"></td>
        </tr>
        </table>
    </form>
</body>
</html>
