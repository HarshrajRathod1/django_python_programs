{%extends 'base.html'%}
{%block content%}
<div
  class="w-50 p-4 bg-light"
  style="margin: 15px auto; border-radius: 10px; box-shadow: 0 0 5px white"
>
  <div class="fs-4 fw-bold text-center p-2" style="color: rgb(134, 0, 0)">
    Update User Details
  </div>
  <form class="row g-3" method="post">
    {%csrf_token%}
    <div class="col-md-6">
      <label for="fname" class="form-label"> First Name</label>
      <input
        type="text"
        class="form-control"
        id="fname"
        name="fname"
        placeholder="Harshraj"
        value="{{form.fname.value}}"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="lname" class="form-label"> Last Name</label>
      <input
        type="text"
        class="form-control"
        id="lname"
        name="lname"
        placeholder="Rathod"
        value="{{form.lname.value}}"
        required
      />
    </div>
    <div class="col-12">
      <label for="uname" class="form-label"> User Name</label>
      <input
        type="text"
        class="form-control"
        id="uname"
        name="uname"
        placeholder="user123"
        value="{{form.uname.value}}"
        required
      />
    </div>
    <div class="col-12">
      <label for="email" class="form-label"> Email </label>
      <input
        type="email"
        class="form-control"
        id="email"
        placeholder="abc@email.com"
        name="email"
        value="{{form.email.value}}"
        required
      />
    </div>
    <div class="col-12">
      <label for="number" class="form-label"> Contact Number</label>
      <input
        type="number"
        class="form-control"
        id="number"
        name="number"
        value="{{form.number.value}}"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="gender" class="form-label" > Gender</label>
      <select id="gender" class="form-select" name="gender" required>
        <option selected>Choose Your Gender</option>
        <option value=male {% if form.gender.value == "male" %}selected{% endif %}>Male</option>
        <option value="female" {% if form.gender.value == 'female'%}selected{% endif %}>Female</option>
        <option value="other" {% if form.gender.value == 'other'%}selected{% endif%}>Other</option>
      </select>
      
    </div>
    <div class="col-md-6">
      <label for="role" class="form-label"> Role</label>
      <select id="gender" name="role" class="form-select" required>
        <option selected>Choose Your Role</option>
        <option value="hr" {% if form.role.value == 'hr'%}selected{% endif %}>HR</option>
        <option value="manager" {% if form.role.value == 'manager'%}selected{% endif %}>Manager</option>
        <option value="cleark" {% if form.role.value == 'cleark'%}selected{% endif %}>cleark</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="inputCity" class="form-label"> City</label>
      <input
        type="text"
        class="form-control"
        id="inputCity"
        name="city"
        placeholder="Hyderabad"
        value="{{form.city.value}}"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="dob" class="form-label"> Date of Birth</label>
      <input type="date" class="form-control" id="dob" name="dob" />
    </div>
    <div class="col-9"></div>
    <div class="col-3">
      <button
        type="submit"
        class="btn btn-success w-100"
        style="margin-top: 10px"
      >
        Update
      </button>
    </div>
  </form>
</div>
{%endblock content%}
