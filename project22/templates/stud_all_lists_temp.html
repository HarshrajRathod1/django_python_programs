<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="2" width="100%">
        <tr>
            <th>Rollno</th>
            <th>Name</th>
            <th>Course</th>
            <th>Photo</th>
        </tr>
        {%for stud in student%}
        <tr>
            <td>{{stud.rollno}}</td>
            <td>{{stud.name}}</td>
            <td>{{stud.course}}</td>
            <td><img src="{{stud.photo.url}}" width="100" height="100"></td>
        </tr>
        {%endfor %}
    </table>
</body>
</html>
